<h1>Send Email</h1>
{% if user %}
  <div>
    已登录：{{ user.username }}
    <a href="{{ url_for('main.email_settings') }}">邮箱配置</a>
    <a href="{{ url_for('main.logout') }}">退出</a>
  </div>
{% else %}
  <div>
    <a href="{{ url_for('main.login') }}">登录</a>
    <a href="{{ url_for('main.register') }}">注册</a>
  </div>
{% endif %}
<div id="flash-message" style="color: red;" data-message='{{ message|tojson }}'>{{ message }}</div>
<script>
  (function () {
    var el = document.getElementById("flash-message");
    if (!el) return;
    var message = JSON.parse(el.dataset.message || '""');
    if (!message) return;
    setTimeout(function () {
      if (el) el.style.display = "none";
    }, 5000);
  })();
</script>
<form action="/" method="post" enctype="multipart/form-data">
  收件人: <input type="text" name="recipient"><br>
  内容: <textarea name="content"></textarea><br>
  附件: <input type="file" name="file"><br>
  <input type="submit" value="发送">
</form>
